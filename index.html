<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycbwKOq3dDR7uppBXaYwgE30ha4LaHxgfhYC7QxcabSn0F3a7obepYftUHrss51H1yTm-TA/exec">
  <title>Sistem Poin BK - SMA Muhammadiyah Al-Ghifari</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0D2560 0%, #1E3A8A 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .box {
      background: white; border-radius: 20px;
      padding: 40px 36px; text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 380px; width: 90%;
    }
    .logo {
      width: 64px; height: 64px; border-radius: 16px;
      background: linear-gradient(135deg, #FFB800, #FFD700);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; font-size: 28px;
    }
    h1 { font-size: 20px; font-weight: 800; color: #0D2560; margin-bottom: 6px; }
    p  { font-size: 13px; color: #64748B; margin-bottom: 24px; }
    .spinner {
      width: 36px; height: 36px; border: 4px solid #E2E8F0;
      border-top-color: #1E3A8A; border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .redirect-text { font-size: 13px; color: #94A3B8; margin-bottom: 20px; }
    a {
      display: inline-block;
      background: linear-gradient(135deg, #0D2560, #1E3A8A);
      color: white; text-decoration: none;
      padding: 12px 28px; border-radius: 10px;
      font-size: 14px; font-weight: 700;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">🛡️</div>
    <h1>Sistem Poin BK</h1>
    <p>SMA Muhammadiyah Al-Ghifari</p>
    <div class="spinner"></div>
    <p class="redirect-text">Mengalihkan ke aplikasi...</p>
    <a href="https://script.google.com/macros/s/AKfycbwKOq3dDR7uppBXaYwgE30ha4LaHxgfhYC7QxcabSn0F3a7obepYftUHrss51H1yTm-TA/exec">
      Buka Aplikasi →
    </a>
  </div>
</body>
</html>
